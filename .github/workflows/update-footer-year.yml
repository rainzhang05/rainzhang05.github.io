# Bumps the copyright year in html/footer.html on January 1 at 00:00 America/Vancouver.
# Vancouver uses PST (UTC-8) in winter, so local midnight = 08:00 UTC on Jan 1.
name: Update footer copyright year

on:
    schedule:
        - cron: "0 8 1 1 *"
    workflow_dispatch:

permissions:
    contents: write

concurrency:
    group: update-footer-year
    cancel-in-progress: true

jobs:
    update-year:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4

            - name: Set copyright year (America/Vancouver)
              run: |
                set -euo pipefail
                YEAR="$(TZ=America/Vancouver date +%Y)"
                sed -i "s/© [0-9][0-9][0-9][0-9] Rain Zhang/© ${YEAR} Rain Zhang/" html/footer.html
                echo "Target year: ${YEAR}"

            - name: Commit and push if changed
              run: |
                set -euo pipefail
                git config user.name "github-actions[bot]"
                git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                git add html/footer.html
                if git diff --staged --quiet; then
                  echo "Footer year already up to date; nothing to commit."
                  exit 0
                fi
                YEAR="$(TZ=America/Vancouver date +%Y)"
                git commit -m "chore(footer): update copyright year to ${YEAR}"
                git push origin HEAD:main
